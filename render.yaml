# Render Blueprint — deploy both API and Dashboard
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API (FastAPI + Background Workers) ──────────────────
  - type: web
    name: ict-trading-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - fromGroup: trading-settings

  # ── Frontend Dashboard (Static Site) ────────────────────────────
  - type: web
    name: ict-trading-dashboard
    runtime: static
    region: oregon
    buildCommand: cd dashboard && npm ci && npm run build
    staticPublishPath: dashboard/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://ict-trading-api.onrender.com

envVarGroups:
  - name: trading-settings
    envVars:
      - key: BINANCE_API_KEY
        sync: false  # paste your Binance API key in Render dashboard
      - key: BINANCE_SECRET
        sync: false  # paste your Binance API secret in Render dashboard
      - key: EXCHANGE_MODE
        value: demo  # switch to 'live' when ready for real trading
      - key: DISCORD_WEBHOOK_URL
        sync: false  # paste your Discord webhook URL in Render dashboard
